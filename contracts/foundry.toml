[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.19"
via_ir = true
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
zkSyncTestnet = "${ZKSYNC_TESTNET_RPC}"
arbitrumSepolia = "${ARBITRUM_SEPOLIA_RPC}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }

[profile.ci]
via_ir = true
optimizer_runs = 200
